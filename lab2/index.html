<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 2</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
        }

        input {
            padding: 10px;
            border-radius: 10px;
            border: none;
            width: 300px;
            margin: 5px;
        }

        button {
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            margin: 5px;
        }

        .run {
            background: #1e40af;
            color: white;
        }

        .save {
            background: #047857;
            color: white;
        }

        .clear {
            background: #b91c1c;
            color: white;
        }

        #output {
            margin-top: 20px;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
            max-height: 350px;
            overflow-y: scroll;
            white-space: pre-wrap;
        }

        .section {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Laboratory Work #2</h1>

    <div class="section">
        <input type="text" id="textInput" placeholder="Enter text for MD5">
        <button class="run" onclick="hashText()">Hash Text</button>
    </div>

    <div class="section">
        <input type="file" id="fileInput">
        <button class="run" onclick="hashFile()">Hash File</button>
    </div>

    <div class="section">
        <input type="file" id="checkFileInput">
        <input type="file" id="hashFileInput">
        <button class="run" onclick="checkIntegrity()">Check Integrity</button>
    </div>

    <div class="section">
        <button class="save" onclick="save()">Save</button>
        <button class="clear" onclick="clearOutput()">Clear</button>
    </div>

    <div id="output"></div>

    <script src="md5.js"></script>
    <script src="lab2.js"></script>

</body>
<a href="../index.html" style="color:white; margin:20px; display:block;">
    ← Back to menu
</a>
</html>
