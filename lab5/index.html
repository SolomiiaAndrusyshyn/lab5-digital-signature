<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratory Work #5</title>

    <style>
        body {
            margin: 0;
            background: #08152f;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            min-height: 100vh;
            padding-top: 40px;
        }

        a.back {
            color: white;
            text-decoration: none;
            font-size: 20px;
            display: block;
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        h2 {
            font-weight: normal;
            margin-bottom: 30px;
        }

        .container {
            width: 80%;
            max-width: 900px;
            margin: 0 auto;
        }

        input[type="text"],
        input[type="file"],
        textarea {
            width: 80%;
            padding: 12px;
            margin: 10px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }

        textarea {
            height: 120px;
            background: #1a2742;
            color: white;
            resize: none;
        }

        button {
            padding: 12px 20px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            background: #2f80ed;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1c60b8;
        }

        #output {
            width: 90%;
            height: 260px;
            margin-top: 20px;
            background: #1a2742;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px;
            resize: none;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <a href="../index.html" class="back">← Back to menu</a>

    <h1>Laboratory Work #5</h1>
    <h2>Digital Signature</h2>

    <div class="container">
        <textarea id="messageInput" placeholder="Enter message to sign..."></textarea><br>

        <button onclick="generateKeys()">Generate DSS Keys</button>
        <button onclick="signMessage()">Sign Message</button>
        <button onclick="verifyMessage()">Verify Message</button>

        <br>

        <input type="file" id="fileInput"><br>

        <button onclick="signFile()">Sign File</button>
        <button onclick="verifyFile()">Verify File</button>

        <br>

        <button onclick="savePrivateKey()">Save Private Key</button>
        <button onclick="savePublicKey()">Save Public Key</button>

        <br>

        <input type="file" id="privateKeyFile">
        <button onclick="loadPrivateKey()">Load Private Key</button>

        <br>

        <input type="file" id="publicKeyFile">
        <button onclick="loadPublicKey()">Load Public Key</button>

        <br>

        <button onclick="saveSignature()">Save Signature</button>
        <input type="file" id="signatureFile">
        <button onclick="loadSignature()">Load Signature</button>

        <textarea id="output" readonly placeholder="Program output..."></textarea>
    </div>

    <script src="lab5.js"></script>
</body>
</html>
